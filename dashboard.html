<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>肴柒蟹 - 我的养殖</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🦀%3C/text%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-50">
  <script src="script.js"></script>
  <script>
    // 检查登录
    if (!Auth.requireAuth()) {}
  </script>

  <!-- 顶部导航 -->
  <nav class="bg-white shadow-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center space-x-3">
          <a href="dashboard.html" class="text-2xl font-bold bg-gradient-to-r from-tech-blue to-food-red bg-clip-text text-transparent">
            🦀 肴柒蟹
          </a>
          <span class="text-xs text-gray-400 hidden sm:inline">养殖户管理中心</span>
        </div>
        <div class="flex items-center space-x-4">
          <span class="text-sm text-gray-600 hidden sm:inline">
            <i class="bi bi-person-circle text-tech-blue mr-1"></i><span id="navUsername">用户</span>
          </span>
          <a href="dashboard.html" class="text-sm text-tech-blue font-medium hover:underline">
            <i class="bi bi-grid-fill mr-1"></i>仪表盘
          </a>
          <a href="index.html" class="text-sm text-gray-500 hover:text-gray-700 transition-colors">
            <i class="bi bi-globe2 mr-1"></i>网站首页
          </a>
          <button onclick="Auth.logout()" class="px-3 py-1.5 text-sm bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition-colors">
            退出
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div id="loading" class="text-center py-20">
      <i class="bi bi-arrow-repeat text-4xl text-tech-blue animate-spin"></i>
      <p class="text-gray-500 mt-4">加载中...</p>
    </div>
    <div id="dashboardContent" class="hidden">
      <!-- 欢迎 + 添加塘口 -->
      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-2xl font-bold text-gray-800" id="greeting">
            👋 你好，用户
          </h1>
          <p class="text-sm text-gray-500 mt-1">欢迎回到肴柒蟹养殖管理中心</p>
        </div>
        <a href="pond-form.html" class="px-5 py-2.5 bg-tech-blue text-white rounded-xl text-sm font-medium hover:bg-tech-blue-dark transition-all flex items-center">
          <i class="bi bi-plus-lg mr-1.5"></i> 添加塘口
        </a>
      </div>

      <!-- 统计概览 -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="statsGrid">
        <div class="bg-white rounded-2xl shadow-card p-5 border border-gray-100">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-gray-500">塘口数量</p>
              <p class="text-2xl font-bold text-gray-800 mt-1" id="statPondCount">0</p>
            </div>
            <div class="w-12 h-12 rounded-xl bg-tech-blue/10 flex items-center justify-center">
              <i class="bi bi-water text-tech-blue text-xl"></i>
            </div>
          </div>
        </div>
        <div class="bg-white rounded-2xl shadow-card p-5 border border-gray-100">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-gray-500">养殖总面积</p>
              <p class="text-2xl font-bold text-gray-800 mt-1"><span id="statTotalArea">0</span> <span class="text-sm font-normal text-gray-400">亩</span></p>
            </div>
            <div class="w-12 h-12 rounded-xl bg-water-green/10 flex items-center justify-center">
              <i class="bi bi-bounding-box-circles text-water-green text-xl"></i>
            </div>
          </div>
        </div>
        <div class="bg-white rounded-2xl shadow-card p-5 border border-gray-100">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-gray-500">用户类型</p>
              <p class="text-2xl font-bold text-gray-800 mt-1" id="statRole">👨‍🌾 养殖户</p>
            </div>
            <div class="w-12 h-12 rounded-xl bg-harvest-gold/10 flex items-center justify-center">
              <i class="bi bi-person-badge text-harvest-gold text-xl"></i>
            </div>
          </div>
        </div>
        <div class="bg-white rounded-2xl shadow-card p-5 border border-gray-100">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-gray-500">最近记录</p>
              <p class="text-2xl font-bold text-gray-800 mt-1" id="statLatestLog">暂无</p>
            </div>
            <div class="w-12 h-12 rounded-xl bg-food-red/10 flex items-center justify-center">
              <i class="bi bi-journal-text text-food-red text-xl"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- 塘口列表 -->
      <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
        <i class="bi bi-grid-3x3-gap-fill text-tech-blue mr-2"></i> 我的养殖塘口
      </h2>
      <div id="pondList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      <div id="emptyState" class="hidden bg-white rounded-2xl shadow-card p-12 text-center border border-gray-100">
        <span class="text-6xl block mb-4">🏞️</span>
        <h3 class="text-xl font-bold text-gray-800 mb-2">还没有添加塘口</h3>
        <p class="text-gray-500 mb-6">点击下方按钮添加您的第一个养殖塘口，开始记录环境数据和养殖日志</p>
        <a href="pond-form.html" class="inline-block px-6 py-3 bg-tech-blue text-white rounded-xl font-medium hover:bg-tech-blue-dark transition-all">
          <i class="bi bi-plus-lg mr-1.5"></i> 添加塘口
        </a>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const result = await Api.getDashboard();

      if (!result.success) {
        window.location.href = 'login.html';
        return;
      }

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('dashboardContent').classList.remove('hidden');

      const { user, ponds, stats } = result;

      // 导航栏用户名
      document.getElementById('navUsername').textContent = user.username;

      // 问候语
      document.getElementById('greeting').innerHTML = `👋 你好，${user.real_name || user.username}`;

      // 统计
      document.getElementById('statPondCount').textContent = stats.pond_count;
      document.getElementById('statTotalArea').textContent = (stats.total_area || 0).toFixed(1);
      const roleMap = { farmer: '👨‍🌾 养殖户', consumer: '🍽️ 消费者', expert: '🔬 专家' };
      document.getElementById('statRole').textContent = roleMap[user.role] || user.role;
      document.getElementById('statLatestLog').textContent = stats.latest_log ? stats.latest_log.log_date : '暂无';

      // 塘口列表
      const pondList = document.getElementById('pondList');
      const emptyState = document.getElementById('emptyState');

      if (!ponds || ponds.length === 0) {
        pondList.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      pondList.innerHTML = ponds.map(p => `
        <div class="bg-white rounded-2xl shadow-card border border-gray-100 overflow-hidden hover:shadow-card-hover transition-all">
          <div class="bg-gradient-to-r from-tech-blue to-tech-blue-dark px-6 py-4 text-white">
            <div class="flex items-center justify-between">
              <h3 class="font-bold text-lg">${p.name}</h3>
              <span class="text-xs bg-white/20 px-2 py-0.5 rounded-full">${p.species || '未设定'}</span>
            </div>
          </div>
          <div class="p-5">
            <div class="grid grid-cols-2 gap-3 text-sm mb-4">
              <div>
                <span class="text-gray-400">面积</span>
                <p class="font-medium text-gray-800">${p.area || '-'} 亩</p>
              </div>
              <div>
                <span class="text-gray-400">水深</span>
                <p class="font-medium text-gray-800">${p.water_depth || '-'} m</p>
              </div>
              <div>
                <span class="text-gray-400">位置</span>
                <p class="font-medium text-gray-800 truncate">${p.location || '-'}</p>
              </div>
              <div>
                <span class="text-gray-400">增氧机</span>
                <p class="font-medium text-gray-800">${p.aeration ? '✅ 已配备' : '❌ 未配备'}</p>
              </div>
            </div>
            <div class="flex space-x-2">
              <a href="pond-detail.html?id=${p.id}" class="flex-1 text-center px-3 py-2 bg-tech-blue text-white rounded-xl text-sm font-medium hover:bg-tech-blue-dark transition-colors">
                <i class="bi bi-eye mr-1"></i> 查看详情
              </a>
              <a href="pond-form.html?id=${p.id}" class="px-3 py-2 bg-gray-100 text-gray-600 rounded-xl text-sm font-medium hover:bg-gray-200 transition-colors">
                <i class="bi bi-pencil"></i>
              </a>
              <button onclick="deletePond(${p.id}, '${p.name}')" class="px-3 py-2 bg-red-50 text-food-red rounded-xl text-sm font-medium hover:bg-red-100 transition-colors">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>
        </div>
      `).join('');
    });

    async function deletePond(id, name) {
      if (!confirm('确定删除「' + name + '」吗？所有数据将不可恢复。')) return;
      const result = await Api.deletePond(id);
      if (result.success) {
        window.location.reload();
      } else {
        alert(result.message || '删除失败');
      }
    }
  </script>
</body>
</html>
