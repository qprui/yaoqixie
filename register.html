<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>肴柒蟹 - 注册</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🦀%3C/text%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-50">
  <div class="min-h-screen flex">
    <!-- 左侧背景 -->
    <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-food-red to-food-red-dark items-center justify-center p-12">
      <div class="text-center text-white">
        <span class="text-8xl block mb-4">🦞</span>
        <h1 class="text-4xl font-bold mb-2">加入肴柒蟹</h1>
        <p class="text-white/70 text-lg">注册即享以下权益</p>
        <div class="mt-8 text-left space-y-4">
          <div class="flex items-center bg-white/10 rounded-xl p-4 backdrop-blur-sm">
            <i class="bi bi-speedometer2 text-2xl mr-4"></i>
            <div>
              <p class="font-medium">智慧养殖管理</p>
              <p class="text-sm text-white/70">实时监控塘口环境，记录养殖日志</p>
            </div>
          </div>
          <div class="flex items-center bg-white/10 rounded-xl p-4 backdrop-blur-sm">
            <i class="bi bi-arrow-left-right text-2xl mr-4"></i>
            <div>
              <p class="font-medium">市场行情直查</p>
              <p class="text-sm text-white/70">实时价格、供需匹配、政策资讯</p>
            </div>
          </div>
          <div class="flex items-center bg-white/10 rounded-xl p-4 backdrop-blur-sm">
            <i class="bi bi-people-fill text-2xl mr-4"></i>
            <div>
              <p class="font-medium">行业社区交流</p>
              <p class="text-sm text-white/70">与数万养殖户和美食爱好者互动</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧表单 -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 overflow-y-auto">
      <div class="w-full max-w-md py-8">
        <div class="text-center mb-8 lg:hidden">
          <span class="text-4xl">🦞</span>
          <h1 class="text-2xl font-bold bg-gradient-to-r from-tech-blue to-food-red bg-clip-text text-transparent mt-2">肴柒蟹</h1>
        </div>

        <h2 class="text-2xl font-bold text-gray-800 mb-1">创建账号</h2>
        <p class="text-gray-500 mb-8">加入肴柒蟹，开启智慧养殖之旅</p>

        <div id="errorMsg" class="hidden mb-4 px-4 py-3 bg-red-50 text-red-700 text-sm rounded-xl border border-red-200 flex items-center">
          <i class="bi bi-exclamation-circle-fill mr-2 flex-shrink-0"></i>
          <span id="errorText"></span>
        </div>
        <div id="successMsg" class="hidden mb-4 px-4 py-3 bg-green-50 text-green-700 text-sm rounded-xl border border-green-200 flex items-center">
          <i class="bi bi-check-circle-fill mr-2 flex-shrink-0"></i>
          <span id="successText"></span>
        </div>

        <form id="registerForm" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">用户名 <span class="text-food-red">*</span></label>
              <input type="text" id="username" required
                class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all"
                placeholder="如：张师傅">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">真实姓名</label>
              <input type="text" id="realName"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all"
                placeholder="选填">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">手机号 <span class="text-food-red">*</span></label>
            <input type="tel" id="phone" required
              class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all"
              placeholder="接收养殖提醒">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
            <input type="email" id="email"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all"
              placeholder="选填">
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">密码 <span class="text-food-red">*</span></label>
              <input type="password" id="password" required minlength="6"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all"
                placeholder="至少6位">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">确认密码 <span class="text-food-red">*</span></label>
              <input type="password" id="passwordConfirm" required minlength="6"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all"
                placeholder="再次输入">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">用户类型 <span class="text-food-red">*</span></label>
            <div class="grid grid-cols-2 gap-3">
              <label class="relative border border-gray-300 rounded-xl p-4 cursor-pointer hover:border-tech-blue transition-all has-[:checked]:border-tech-blue has-[:checked]:bg-tech-blue/5">
                <input type="radio" name="role" id="roleFarmer" value="farmer" class="sr-only" checked>
                <div class="text-center">
                  <span class="text-2xl block mb-1">👨‍🌾</span>
                  <p class="text-sm font-medium text-gray-800">养殖户</p>
                  <p class="text-xs text-gray-400">塘口管理 · 环境监控</p>
                </div>
              </label>
              <label class="relative border border-gray-300 rounded-xl p-4 cursor-pointer hover:border-food-red transition-all has-[:checked]:border-food-red has-[:checked]:bg-food-red/5">
                <input type="radio" name="role" id="roleConsumer" value="consumer" class="sr-only">
                <div class="text-center">
                  <span class="text-2xl block mb-1">🍽️</span>
                  <p class="text-sm font-medium text-gray-800">美食爱好者</p>
                  <p class="text-xs text-gray-400">菜谱 · 社区交流</p>
                </div>
              </label>
            </div>
          </div>

          <div id="farmerFields" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">养殖场地址</label>
              <input type="text" id="farmAddress"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all"
                placeholder="如：湖北省潜江市××镇">
            </div>
          </div>

          <button type="submit"
            class="w-full py-3 bg-gradient-to-r from-tech-blue to-food-red text-white rounded-xl font-medium hover:shadow-lg hover:-translate-y-0.5 transition-all">
            <i class="bi bi-person-plus-fill mr-2"></i> 免费注册
          </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-500">
          已有账号？
          <a href="login.html" class="text-tech-blue font-medium hover:underline">立即登录</a>
        </p>

        <div class="mt-6 text-center">
          <a href="index.html" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">
            <i class="bi bi-arrow-left mr-1"></i> 返回肴柒蟹首页
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // 角色切换
    document.querySelectorAll('input[name="role"]').forEach(radio => {
      radio.addEventListener('change', () => {
        document.getElementById('farmerFields').style.display =
          document.querySelector('input[name="role"]:checked').value === 'farmer' ? 'block' : 'none';
      });
    });

    // 注册提交
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;
      
      if (password !== passwordConfirm) {
        showError('两次密码输入不一致');
        return;
      }

      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="bi bi-arrow-repeat mr-2 animate-spin"></i> 注册中...';

      const data = {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        password: password,
        password_confirm: passwordConfirm,
        role: document.querySelector('input[name="role"]:checked').value,
        real_name: document.getElementById('realName').value.trim(),
        farm_address: document.getElementById('farmAddress').value.trim(),
      };

      const result = await Api.register(data);

      if (result.success) {
        document.getElementById('errorMsg').classList.add('hidden');
        const successMsg = document.getElementById('successMsg');
        successMsg.classList.remove('hidden');
        document.getElementById('successText').textContent = '注册成功！即将跳转到登录页面...';
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      } else {
        showError(result.message || '注册失败，请重试');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-person-plus-fill mr-2"></i> 免费注册';
      }
    });

    function showError(msg) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.classList.remove('hidden');
      document.getElementById('errorText').textContent = msg;
    }
  </script>
</body>
</html>
