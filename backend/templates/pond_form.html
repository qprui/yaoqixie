{% extends "base.html" %}
{% block title %}肴柒蟹 - {{ '编辑' if pond else '添加' }}塘口{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-50 py-12">
  <div class="max-w-2xl mx-auto px-4">
    <div class="bg-white rounded-2xl shadow-card p-8">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-xl font-bold text-gray-800">{{ '编辑' if pond else '添加' }}养殖塘口</h1>
          <p class="text-sm text-gray-500 mt-1">{{ '修改塘口信息' if pond else '填写塘口基本信息' }}</p>
        </div>
        <a href="http://127.0.0.1:5000/dashboard" class="text-sm text-gray-400 hover:text-gray-600 transition-colors">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>

      <form method="POST" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">塘口名称 <span class="text-food-red">*</span></label>
          <input type="text" name="name" value="{{ form.name or '' }}" required
            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all"
            placeholder="如：一号塘、东区虾塘">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">面积（亩）</label>
            <input type="number" name="area" value="{{ form.area or '' }}" step="0.1"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all"
              placeholder="如：10">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">水深（m）</label>
            <input type="number" name="water_depth" value="{{ form.water_depth or '' }}" step="0.1"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all"
              placeholder="如：1.5">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">养殖品种</label>
            <select name="species"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all">
              <option value="">-- 请选择 --</option>
              <option value="中华绒螯蟹（大闸蟹）" {{ 'selected' if form.species == '中华绒螯蟹（大闸蟹）' }}>🦀 中华绒螯蟹（大闸蟹）</option>
              <option value="克氏原螯虾（小龙虾）" {{ 'selected' if form.species == '克氏原螯虾（小龙虾）' }}>🦞 克氏原螯虾（小龙虾）</option>
              <option value="锦绣龙虾" {{ 'selected' if form.species == '锦绣龙虾' }}>🦐 锦绣龙虾</option>
              <option value="波纹龙虾" {{ 'selected' if form.species == '波纹龙虾' }}>🦐 波纹龙虾</option>
              <option value="青蟹" {{ 'selected' if form.species == '青蟹' }}>🦀 青蟹</option>
              <option value="混合养殖" {{ 'selected' if form.species == '混合养殖' }}>🔄 混合养殖</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">放养密度（只/亩）</label>
            <input type="number" name="stock_density" value="{{ form.stock_density or '' }}"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all"
              placeholder="如：5000">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">地理位置</label>
          <input type="text" name="location" value="{{ form.location or '' }}"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all"
            placeholder="如：湖北省潜江市后湖管理区">
        </div>

        <div class="flex items-center">
          <input type="checkbox" name="aeration" id="aeration" value="1" {{ 'checked' if form.aeration else '' }}
            class="mr-3 rounded border-gray-300 text-tech-blue focus:ring-tech-blue">
          <label for="aeration" class="text-sm text-gray-700">已配备增氧机</label>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
          <textarea name="notes" rows="3"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue transition-all"
            placeholder="补充信息...">{{ form.notes or '' }}</textarea>
        </div>

        <div class="flex space-x-3">
          <button type="submit"
            class="flex-1 py-3 bg-tech-blue text-white rounded-xl font-medium hover:bg-tech-blue-dark transition-all">
            <i class="bi bi-check-lg mr-1.5"></i> {{ '保存修改' if pond else '添加塘口' }}
          </button>
          <a href="http://127.0.0.1:5000/dashboard"
            class="px-6 py-3 bg-gray-100 text-gray-600 rounded-xl font-medium hover:bg-gray-200 transition-all text-center">
            取消
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
