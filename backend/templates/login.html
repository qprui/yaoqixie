{% extends "base.html" %}
{% block title %}肴柒蟹 - 登录{% endblock %}
{% block content %}
<div class="min-h-screen flex">
  <!-- 左侧背景 -->
  <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-tech-blue to-tech-blue-dark items-center justify-center p-12">
    <div class="text-center text-white">
      <span class="text-8xl block mb-4">🦀</span>
      <h1 class="text-4xl font-bold mb-2">肴柒蟹</h1>
      <p class="text-white/70 text-lg">科技赋能养殖 · 美味连接生活</p>
      <div class="mt-8 text-left bg-white/10 rounded-2xl p-6 backdrop-blur-sm">
        <p class="text-sm text-white/80">已有账号？</p>
        <p class="text-sm text-white/80 mt-1">登录即可管理您的养殖塘口、记录养殖日志、查看实时环境数据。</p>
      </div>
    </div>
  </div>

  <!-- 右侧表单 -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
    <div class="w-full max-w-md">
      <div class="text-center mb-8 lg:hidden">
        <span class="text-4xl">🦀</span>
        <h1 class="text-2xl font-bold bg-gradient-to-r from-tech-blue to-food-red bg-clip-text text-transparent mt-2">肴柒蟹</h1>
      </div>

      <h2 class="text-2xl font-bold text-gray-800 mb-1">欢迎回来</h2>
      <p class="text-gray-500 mb-8">登录您的账号</p>

      <form method="POST" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">用户名 / 邮箱</label>
          <input type="text" name="username" required
            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue focus:border-transparent transition-all"
            placeholder="输入用户名或邮箱">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
          <input type="password" name="password" required
            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-tech-blue focus:border-transparent transition-all"
            placeholder="输入密码">
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center text-sm text-gray-600">
            <input type="checkbox" name="remember" class="mr-2 rounded border-gray-300 text-tech-blue focus:ring-tech-blue">
            记住我
          </label>
          <a href="#" class="text-sm text-tech-blue hover:underline">忘记密码？</a>
        </div>
        <button type="submit"
          class="w-full py-3 bg-gradient-to-r from-tech-blue to-food-red text-white rounded-xl font-medium hover:shadow-lg hover:-translate-y-0.5 transition-all">
          <i class="bi bi-box-arrow-in-right mr-2"></i> 登录
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-500">
        还没有账号？
        <a href="{{ url_for('register') }}" class="text-tech-blue font-medium hover:underline">立即注册</a>
      </p>

      <div class="mt-8 text-center">
        <a href="/static/index.html" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">
          <i class="bi bi-arrow-left mr-1"></i> 返回肴柒蟹首页
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
